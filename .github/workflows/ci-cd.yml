name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# ─────────────────────────────────────────────────────────
#  JOB 1 — Test backend
# ─────────────────────────────────────────────────────────
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -q


# ─────────────────────────────────────────────────────────
#  JOB 2 — Build & push backend image
# ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max


# ─────────────────────────────────────────────────────────
#  JOB 3 — Deploy backend to EC2
#  Only updates the app container — frontend is deployed
#  independently from the OmniKart-UI repo.
# ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy backend to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            mkdir -p ~/market-sentinel
            cd ~/market-sentinel

            # Update only the backend image tag — leave FRONTEND_IMAGE untouched
            if [ -f .env ]; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${{ needs.build.outputs.image }}:${{ github.sha }}|" .env
            else
              echo "APP_IMAGE=${{ needs.build.outputs.image }}:${{ github.sha }}" > .env
            fi

            # Fetch latest prod compose from repo
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/docker-compose.prod.yml \
              -o docker-compose.prod.yml

            # Login, pull new backend image, restart only the app container
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-deps app

            docker image prune -f
