name: CI/CD

# Triggers:
#   - Every push to main       → test + build + deploy
#   - Every pull request to main → test only (no deploy)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ─────────────────────────────────────────────────────────
#  JOB 1 — Test
#  Runs on every push and every PR.
#  Spins up a real Redis container so @SpringBootTest passes.
# ─────────────────────────────────────────────────────────
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs — faster CI

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -q


# ─────────────────────────────────────────────────────────
#  JOB 2 — Build & Push image to GHCR
#  Runs only on pushes to main (not on PRs).
#  Uses Docker layer caching so rebuilds are fast.
#  GHCR requires lowercase image names — we derive it here.
# ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write     # needed to push to GHCR

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3       # enables advanced caching

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag with both :latest and the exact commit SHA so you can
          # roll back to any previous version with: docker pull image:<sha>
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha       # reuse cached layers from previous runs
          cache-to:   type=gha,mode=max


# ─────────────────────────────────────────────────────────
#  JOB 3 — Deploy to EC2
#  SSH into your EC2 instance, pull the new image,
#  and restart the containers with zero downtime.
# ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}     # your EC2 public IP
          username: ${{ secrets.EC2_USER }}     # ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}  # contents of your .pem file
          script: |
            set -e

            IMAGE="${{ needs.build-and-push.outputs.image }}"

            # Write the current image tag into .env so docker compose picks it up
            mkdir -p ~/market-sentinel
            cd ~/market-sentinel

            echo "APP_IMAGE=${IMAGE}:${{ github.sha }}" > .env

            # Download the latest prod compose file directly from the repo
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml \
              -o docker-compose.prod.yml

            # Authenticate with GHCR to pull the image
            echo "${{ secrets.GITHUB_TOKEN }}" \
              | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image and restart only changed containers
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up dangling images to save disk space
            docker image prune -f
