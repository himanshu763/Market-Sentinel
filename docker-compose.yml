services:

  # ─────────────────────────────────────────────
  #  Spring Boot app
  # ─────────────────────────────────────────────
  app:
    build: .
    container_name: market-sentinel-app
    ports:
      - "8080:8080"
    environment:
      # Overrides the localhost default in application.properties.
      # The value "redis" is the service name below — Docker's
      # internal DNS resolves it automatically.
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy   # wait until Redis is actually ready
    restart: on-failure

  # ─────────────────────────────────────────────
  #  Redis cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: market-sentinel-redis
    ports:
      - "6379:6379"          # expose locally so you can redis-cli from host
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Kafka + Zookeeper  (Phase 3 — uncomment when
  #  ready to migrate from CompletableFuture fan-out)
  # ─────────────────────────────────────────────
