spring.application.name=market-sentinel

# Defaults to localhost so plain `mvn spring-boot:run` still works.
# docker-compose.yml overrides these with REDIS_HOST=redis / REDIS_PORT=6379.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}


# ── Circuit Breaker (Resilience4j) ──────────────────────────────────────────
# Design spec: open after 5 failures in 30s window; probe again after 60s
resilience4j.circuitbreaker.configs.default.slidingWindowType=TIME_BASED
resilience4j.circuitbreaker.configs.default.slidingWindowSize=30
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=100
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=60s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=1
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true

resilience4j.circuitbreaker.instances.amazon.baseConfig=default
resilience4j.circuitbreaker.instances.blinkit.baseConfig=default
resilience4j.circuitbreaker.instances.zepto.baseConfig=default
resilience4j.circuitbreaker.instances.myntra.baseConfig=default
resilience4j.circuitbreaker.instances.nykaa.baseConfig=default