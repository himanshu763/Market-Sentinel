services:

  # ─────────────────────────────────────────────
  #  Spring Boot app
  #  APP_IMAGE is injected by the CI/CD pipeline
  #  (written to .env before docker compose up).
  # ─────────────────────────────────────────────
  app:
    image: ${APP_IMAGE:-ghcr.io/your-github-username/market-sentinel:latest}
    container_name: market-sentinel-app
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Keeps the JVM inside t2.micro's 1 GB RAM budget.
      # Spring Boot + Redis together sit ~500 MB peak, leaving ~500 MB headroom.
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms256m"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Redis cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: market-sentinel-redis
    # Don't expose 6379 to the internet on a prod server —
    # only the app container needs to reach it.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
