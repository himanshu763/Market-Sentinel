services:

  # ─────────────────────────────────────────────
  #  React frontend (Nginx)
  #  Serves the UI on port 80 and proxies
  #  /api/* to the Spring Boot backend.
  # ─────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/himanshu763/market-sentinel-ui:latest}
    container_name: market-sentinel-frontend
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Spring Boot backend
  # ─────────────────────────────────────────────
  app:
    image: ${APP_IMAGE:-ghcr.io/himanshu763/market-sentinel:latest}
    container_name: market-sentinel-app
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: "-Xmx384m -Xms256m"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Redis cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: market-sentinel-redis
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
